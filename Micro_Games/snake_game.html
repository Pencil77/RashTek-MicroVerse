<!DOCTYPE html>
<html>
<head>
    <title>Termux Snake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --panel: rgba(15, 23, 42, 0.75);
            --text: #e2e8f0;
            --accent: #22c55e;
            --danger: #ef4444;
            --grid-a: #0b1220;
            --grid-b: #0f172a;
        }

        body {
            background: linear-gradient(180deg, var(--bg-start), var(--bg-end));
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            touch-action: manipulation;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-home {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #fff;
            background: rgba(255,255,255,0.14);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25);
            font-size: 13px;
        }

        .hud {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
            background: var(--panel);
            padding: 10px 14px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        h2 {
            margin: 0;
            font-size: 1rem;
        }

        #gameCanvas {
            background: #020617;
            border: 2px solid #94a3b8;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.45);
            border-radius: 12px;
            width: min(92vw, 420px);
            height: min(92vw, 420px);
            max-height: 420px;
            max-width: 420px;
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 62px);
            gap: 10px;
        }

        button {
            width: 62px;
            height: 62px;
            background: #1f2937;
            border: 1px solid #334155;
            border-radius: 50%;
            color: #e2e8f0;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f172a;
        }

        button:active {
            box-shadow: 0 2px 0 #0f172a;
            transform: translateY(2px);
        }

        .restart-btn {
            width: auto;
            border-radius: 10px;
            padding: 10px 16px;
            margin-top: 16px;
            font-size: 15px;
            background: #14532d;
            border-color: #166534;
            box-shadow: none;
            display: none;
        }

        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← Back to Games</a>

    <div class="hud">
        <h2>🐍 Score: <span id="score">0</span></h2>
        <h2>🏁 Best: <span id="best-score">0</span></h2>
    </div>

    <canvas id="gameCanvas" width="420" height="420"></canvas>

    <div class="controls">
        <button class="up" ontouchstart="setDir('UP')" onclick="setDir('UP')">↑</button>
        <button class="left" ontouchstart="setDir('LEFT')" onclick="setDir('LEFT')">←</button>
        <button class="down" ontouchstart="setDir('DOWN')" onclick="setDir('DOWN')">↓</button>
        <button class="right" ontouchstart="setDir('RIGHT')" onclick="setDir('RIGHT')">→</button>
    </div>

    <button class="restart-btn" id="restart-btn" onclick="restartGame()">Play Again</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 21;
        const tiles = canvas.width / tileSize;

        let snake = [{ x: 10, y: 10 }];
        let direction = null;
        let score = 0;
        let game = null;

        const bestScore = Number(localStorage.getItem('snake-best') || 0);
        document.getElementById('best-score').textContent = bestScore;

        function spawnFood() {
            let next;
            do {
                next = {
                    x: Math.floor(Math.random() * tiles),
                    y: Math.floor(Math.random() * tiles)
                };
            } while (snake.some(part => part.x === next.x && part.y === next.y));
            return next;
        }

        let food = spawnFood();

        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
            else if (key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
            else if (key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
            else if (key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
        });

        function setDir(next) {
            if (next === 'LEFT' && direction !== 'RIGHT') direction = 'LEFT';
            else if (next === 'UP' && direction !== 'DOWN') direction = 'UP';
            else if (next === 'RIGHT' && direction !== 'LEFT') direction = 'RIGHT';
            else if (next === 'DOWN' && direction !== 'UP') direction = 'DOWN';
        }

        function isCollision(head) {
            const outOfBounds = head.x < 0 || head.x >= tiles || head.y < 0 || head.y >= tiles;
            const hitSelf = snake.some((part) => part.x === head.x && part.y === head.y);
            return outOfBounds || hitSelf;
        }

        function drawBoard() {
            for (let y = 0; y < tiles; y++) {
                for (let x = 0; x < tiles; x++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#0b1220' : '#0f172a';
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }
        }

        function drawSnake() {
            snake.forEach((part, i) => {
                ctx.fillStyle = i === 0 ? '#22c55e' : '#16a34a';
                ctx.fillRect(part.x * tileSize, part.y * tileSize, tileSize, tileSize);
                ctx.strokeStyle = '#0f172a';
                ctx.strokeRect(part.x * tileSize, part.y * tileSize, tileSize, tileSize);
            });
        }

        function drawFood() {
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(food.x * tileSize, food.y * tileSize, tileSize, tileSize);
        }

        function endGame() {
            clearInterval(game);
            game = null;
            const previousBest = Number(localStorage.getItem('snake-best') || 0);
            if (score > previousBest) {
                localStorage.setItem('snake-best', score);
                document.getElementById('best-score').textContent = score;
            }
            document.getElementById('restart-btn').style.display = 'inline-block';
            alert(`Game Over! Score: ${score}`);
        }

        function tick() {
            drawBoard();
            drawSnake();
            drawFood();

            if (!direction) return;

            const head = { ...snake[0] };
            if (direction === 'LEFT') head.x -= 1;
            if (direction === 'UP') head.y -= 1;
            if (direction === 'RIGHT') head.x += 1;
            if (direction === 'DOWN') head.y += 1;

            const willEat = head.x === food.x && head.y === food.y;
            if (!willEat) {
                snake.pop();
            }

            if (isCollision(head)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (willEat) {
                score += 1;
                document.getElementById('score').textContent = score;
                food = spawnFood();
            }
        }

        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            direction = null;
            score = 0;
            food = spawnFood();
            document.getElementById('score').textContent = score;
            document.getElementById('restart-btn').style.display = 'none';
            if (game) clearInterval(game);
            game = setInterval(tick, 95);
            tick();
        }

        restartGame();
    </script>
</body>
</html>
