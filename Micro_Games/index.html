    <style>
        :root {
            --bg: #0f172a;

            --accent: #fbbf24;

        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, var(--bg-alt), var(--bg));
            color: var(--text);
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;

        }

        h1 { color: var(--accent); margin-bottom: 10px; }
        h3 { color: var(--muted); font-weight: 400; margin-bottom: 30px; }
        .container { max-width: 760px; margin: 0 auto; display: grid; gap: 14px; }

        .link-item {
            display: flex;
            justify-content: space-between;

            padding: 18px 20px;
            text-decoration: none;
            color: var(--text);
            border-radius: 12px;
            border-left: 5px solid var(--accent-2);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            font-size: 17px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .link-item:hover {
            border-left-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        .link-item:focus-visible,
        .back-btn:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
        }

        .back-btn:hover { color: #fff; }

        @media (prefers-reduced-motion: reduce) {
            .link-item { transition: none; }
            .link-item:hover { transform: none; }
        }
    </style>
</head>
