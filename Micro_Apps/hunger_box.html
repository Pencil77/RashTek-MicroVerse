<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate collection QR order cards quickly with store and item details.">
    <title>Hunger Box · QR Order Collection</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #6a1b9a;
            --primary-hover: #5e178a;
            --text-color: #333;
            --light-text-color: #777;
            --bg-color: #f4f4f4;
            --success-color: #4caf50;
            --focus-color: #ffca28;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 150px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            font: inherit;
        }

        .form-group input:focus,
        .generate-btn:focus-visible,
        .card-action-btn:focus-visible,
        .close-btn:focus-visible {
            outline: 3px solid var(--focus-color);
            outline-offset: 2px;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .actions {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr;
        }

        .generate-btn,
        .card-action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.2s;
            border: none;
        }

        .generate-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .generate-btn:hover {
            background-color: var(--primary-hover);
        }

        .card-action-btn {
            background-color: #ece7f6;
            color: var(--primary-color);
        }

        .card-action-btn:hover {
            background-color: #e2d9f3;
        }

        #order-card-container {
            display: none;
            background: #fff;
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .card-header {
            padding: 20px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #aaa;
            cursor: pointer;
            line-height: 1;
            background: transparent;
            border: none;
        }

        .card-header h2 {
            margin: 0 0 5px 0;
            font-size: 22px;
            color: var(--text-color);
        }

        .card-header p {
            margin: 0;
            color: var(--light-text-color);
            font-size: 14px;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            background-color: #fafafa;
            border-bottom: 1px solid #eee;
        }

        #qrcode {
            padding: 15px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            min-height: 190px;
            min-width: 190px;
            display: grid;
            place-items: center;
        }

        .order-pin {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-color);
            text-align: center;
            word-break: break-word;
        }

        .order-details {
            padding: 20px;
            color: var(--light-text-color);
            font-size: 14px;
            position: relative;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .kot-number {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        .status-message {
            padding: 0 20px;
            font-size: 16px;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        .item-card {
            background: #f9f9f9;
            margin: 0 20px 20px 20px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .store-name {
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            color: var(--text-color);
        }

        .store-icon {
            margin-right: 8px;
            font-size: 18px;
        }

        .status-timeline {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            position: relative;
            gap: 6px;
        }

        .status-timeline::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #ddd;
            z-index: 0;
        }

        .status-step {
            text-align: center;
            font-size: 12px;
            color: var(--light-text-color);
            position: relative;
            z-index: 1;
            background: #f9f9f9;
            padding: 0 5px;
            flex: 1;
        }

        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px auto;
            border: 2px solid #ddd;
            background: #fff;
            color: transparent;
        }

        .status-step.completed .status-icon {
            border-color: var(--success-color);
            background: var(--success-color);
            color: #fff;
        }

        .status-step.completed .status-icon::after {
            content: '✓';
            font-size: 14px;
        }

        .item-name {
            font-size: 15px;
            color: var(--text-color);
            margin-left: 5px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                scroll-behavior: auto !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>

    <form class="form-container" id="qr-form">
        <h1 style="text-align: center; margin-top: 0; font-size: 1.5rem;">Generate Collection QR</h1>
        <div class="form-group">
            <label for="qr-text">Order Text / PIN (Required)</label>
            <input type="text" id="qr-text" placeholder="Enter text for QR code" required maxlength="120" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="store-name">Store Name (Optional)</label>
            <input type="text" id="store-name" placeholder="Default: Chai Kadak" maxlength="80" autocomplete="organization">
        </div>
        <div class="form-group">
            <label for="item-name">Item Name (Optional)</label>
            <input type="text" id="item-name" placeholder="Default: Ginger Chai (x1)" maxlength="120" autocomplete="off">
        </div>
        <div class="actions">
            <button class="generate-btn" type="submit">Generate QR Code</button>
            <button class="card-action-btn" type="button" id="download-btn" disabled>Download QR as PNG</button>
        </div>
    </form>

    <section id="order-card-container" aria-live="polite">
        <div class="card-header">
            <button class="close-btn" type="button" id="close-card-btn" aria-label="Close order card">&times;</button>
            <h2>To collect, scan QR code</h2>
            <p>This QR can be used to collect all items.</p>
        </div>

        <div class="qr-section">
            <div id="qrcode"></div>
            <div class="order-pin">Order PIN: <span id="display-pin"></span></div>
        </div>

        <div class="order-details">
            <div class="detail-row">
                <span>Order Ref.: <span id="order-ref"></span></span>
                <span>KOT</span>
            </div>
            <div class="detail-row" style="margin-top: -5px;">
                <span></span>
                <span class="kot-number" id="kot-number"></span>
            </div>
            <div class="timestamp" id="timestamp"></div>
        </div>

        <div class="status-message">1 item is ready to be collected!</div>

        <div class="item-card">
            <div class="store-name">
                <span class="store-icon">🏪</span>
                <span id="display-store-name">Chai Kadak</span>
            </div>
            <div class="status-timeline">
                <div class="status-step completed">
                    <div class="status-icon"></div>
                    Ordered Items
                </div>
                <div class="status-step completed">
                    <div class="status-icon"></div>
                    Accepted
                </div>
                <div class="status-step completed">
                    <div class="status-icon"></div>
                    Ready
                </div>
                <div class="status-step">
                    <div class="status-icon"></div>
                    Delivered
                </div>
            </div>
            <div class="item-name" id="display-item-name">Ginger Chai (x1)</div>
        </div>
    </section>

    <script>
        const DEFAULT_STORE_NAME = 'Chai Kadak';
        const DEFAULT_ITEM_NAME = 'Ginger Chai (x1)';

        const qrForm = document.getElementById('qr-form');
        const qrTextInput = document.getElementById('qr-text');
        const storeNameInput = document.getElementById('store-name');
        const itemNameInput = document.getElementById('item-name');
        const orderCardContainer = document.getElementById('order-card-container');
        const qrcodeContainer = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');

        function loadLastUsedValues() {
            qrTextInput.value = localStorage.getItem('hb-last-pin') || '';
            storeNameInput.value = localStorage.getItem('hb-last-store') || '';
            itemNameInput.value = localStorage.getItem('hb-last-item') || '';
        }

        function persistValues(pin, storeName, itemName) {
            localStorage.setItem('hb-last-pin', pin);
            localStorage.setItem('hb-last-store', storeName);
            localStorage.setItem('hb-last-item', itemName);
        }

        function buildOrderRef() {
            return `VP${Date.now().toString(36).toUpperCase()}`;
        }

        function buildKotNumber() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function updateOrderDetails(pin, storeName, itemName) {
            document.getElementById('display-pin').textContent = pin;
            document.getElementById('display-store-name').textContent = storeName;
            document.getElementById('display-item-name').textContent = itemName;
            document.getElementById('order-ref').textContent = buildOrderRef();
            document.getElementById('kot-number').textContent = buildKotNumber();

            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
            document.getElementById('timestamp').textContent = `QR generated at: ${timeString}`;
        }

        function generateQRCode(pin) {
            qrcodeContainer.innerHTML = '';
            new QRCode(qrcodeContainer, {
                text: pin,
                width: 160,
                height: 160,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function generateOrderCard(event) {
            event.preventDefault();

            const pin = qrTextInput.value.trim();
            const storeName = storeNameInput.value.trim() || DEFAULT_STORE_NAME;
            const itemName = itemNameInput.value.trim() || DEFAULT_ITEM_NAME;

            if (!pin) {
                alert('Please enter text for the QR code.');
                qrTextInput.focus();
                return;
            }

            updateOrderDetails(pin, storeName, itemName);
            generateQRCode(pin);
            persistValues(pin, storeNameInput.value.trim(), itemNameInput.value.trim());

            orderCardContainer.style.display = 'block';
            downloadBtn.disabled = false;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function closeOrderCard() {
            orderCardContainer.style.display = 'none';
        }

        function downloadQRCode() {
            const qrCanvas = qrcodeContainer.querySelector('canvas');
            if (!qrCanvas) {
                alert('Generate a QR code before downloading.');
                return;
            }

            const link = document.createElement('a');
            link.download = `hunger-box-qr-${Date.now()}.png`;
            link.href = qrCanvas.toDataURL('image/png');
            link.click();
        }

        qrForm.addEventListener('submit', generateOrderCard);
        document.getElementById('close-card-btn').addEventListener('click', closeOrderCard);
        downloadBtn.addEventListener('click', downloadQRCode);
        loadLastUsedValues();
    </script>

</body>
</html>
